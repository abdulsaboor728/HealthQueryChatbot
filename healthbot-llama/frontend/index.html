<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HealthBot (Local)</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial; max-width: 760px; margin: 24px auto; padding: 0 16px; }
    .box { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
    textarea { width: 100%; height: 90px; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>HealthBot (Health-only)</h2>
  <div class="box">
    <div><b>Your message</b></div>
    <textarea id="msg" placeholder="Ask a general health question..."></textarea>
    <div style="margin-top:10px;">
      <button onclick="send()">Send</button>
    </div>
  </div>
  <div class="box">
    <div><b>Reply</b></div>
    <pre id="out"></pre>
  </div>

  <script>
    async function send() {
      const out = document.getElementById("out");
      const msg = document.getElementById("msg").value.trim();
      if (!msg) return;
      out.textContent = "Thinking...";

      const res = await fetch("http://localhost:8000/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      out.textContent = data.reply;
    }
  </script>
</body>
</html>
